<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shuoren Li 李硕仁</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'JetBrains Mono', 'Noto Sans SC', 'Fira Code', Consolas, monospace;
      background: #0a0a12;
      color: #c9d1d9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 30px;
    }

    .container {
      max-width: 1100px;
      width: 100%;
    }

    .terminal-bar {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px 12px 0 0;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .dot { width: 13px; height: 13px; border-radius: 50%; flex-shrink: 0; }
    .dot.red { background: #ff5f56; }
    .dot.yellow { background: #ffbd2e; }
    .dot.green { background: #27c93f; }

    .terminal-title {
      font-size: 12px;
      color: #484f58;
      margin-left: 10px;
      letter-spacing: 0.5px;
      user-select: none;
    }

    .terminal-body {
      background: #0d1117;
      border: 1px solid #30363d;
      border-top: none;
      border-radius: 0 0 12px 12px;
      padding: 36px 40px;
      line-height: 1.9;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      min-height: 400px;
      position: relative;
      overflow: hidden;
    }

    .terminal-body::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(255,255,255,0.015) 2px, rgba(255,255,255,0.015) 4px
      );
      pointer-events: none;
    }

    .line { margin-bottom: 2px; }

    .prompt { color: #3fb950; font-weight: 600; }
    .prompt-user { color: #58a6ff; }
    .path-dir { color: #d29922; }
    .cmd { color: #e6edf3; }
    .output { color: #8b949e; }
    .output p { margin: 2px 0; }

    .highlight { color: #f0883e; font-weight: 600; }
    .accent { color: #58a6ff; }
    .green { color: #3fb950; }
    .dim { color: #484f58; }
    .zh { font-family: 'Noto Sans SC', sans-serif; }

    .link {
      color: #58a6ff;
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s;
    }
    .link:hover { border-bottom-color: #58a6ff; }

    .badge-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 16px 0 0;
    }
    .badge-row img {
      height: 28px;
      border-radius: 4px;
      transition: transform 0.2s;
    }
    .badge-row img:hover { transform: translateY(-2px); }

    hr {
      border: none;
      border-top: 1px solid #21262d;
      margin: 22px 0;
    }

    .cursor-blink {
      display: inline-block;
      width: 10px;
      height: 20px;
      background: #3fb950;
      vertical-align: text-bottom;
      margin-left: 4px;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    .typing-cursor {
      display: inline-block;
      width: 10px;
      height: 20px;
      background: #3fb950;
      vertical-align: text-bottom;
      margin-left: 2px;
      animation: blink 1s step-end infinite;
    }

    .ascii-art {
      color: #3fb950;
      font-size: 11px;
      line-height: 1.25;
      margin-bottom: 18px;
      white-space: pre;
      overflow: hidden;
    }

    .skill-tag {
      display: inline-block;
      padding: 3px 12px;
      margin: 3px 4px 3px 0;
      border: 1px solid #21262d;
      border-radius: 6px;
      font-size: 12px;
      color: #8b949e;
      transition: all 0.2s;
      font-family: 'JetBrains Mono', monospace;
    }
    .skill-tag:hover {
      border-color: #3fb950;
      color: #3fb950;
    }

    .project-block {
      margin: 10px 0;
      padding: 12px 16px;
      border-left: 2px solid #21262d;
      transition: border-color 0.2s;
    }
    .project-block:hover {
      border-left-color: #3fb950;
    }
    .project-block .proj-name {
      font-size: 14px;
      font-weight: 600;
      color: #e6edf3;
    }
    .project-block .proj-name a {
      color: #58a6ff;
      text-decoration: none;
    }
    .project-block .proj-name a:hover {
      text-decoration: underline;
    }
    .project-block .proj-desc {
      font-size: 13px;
      line-height: 1.7;
      margin-top: 4px;
    }
    .project-block .proj-desc .en {
      color: #8b949e;
    }
    .project-block .proj-desc .cn {
      color: #8b949e;
      font-family: 'Noto Sans SC', sans-serif;
    }
    .project-block .proj-tags {
      margin-top: 6px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .project-block .proj-tags span {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 4px;
      background: #161b22;
      color: #484f58;
      border: 1px solid #21262d;
      font-family: 'JetBrains Mono', monospace;
    }

    .exp-line {
      margin: 4px 0;
      display: flex;
      gap: 20px;
    }
    .exp-date {
      color: #484f58;
      min-width: 140px;
      font-size: 12px;
      flex-shrink: 0;
    }
    .exp-detail { color: #8b949e; }
    .exp-company { color: #e6edf3; font-weight: 600; }

    .indent { padding-left: 26px; }

    .research-block {
      margin: 8px 0;
    }
    .research-block .pub-title {
      color: #e6edf3;
      font-weight: 600;
    }
    .research-block .pub-meta {
      font-size: 12px;
      color: #484f58;
    }

    @media (max-width: 820px) {
      body { padding: 20px 12px; }
      .terminal-body { padding: 20px 16px; }
      .exp-line { flex-direction: column; gap: 2px; }
      .exp-date { min-width: auto; }
      .ascii-art { font-size: 6px; }
      .project-block { padding: 8px 12px; }
    }
  </style>
</head>
<body>
  <div class="container">

          { html: `<div class="project-block">

            <div class="proj-desc">

            </div>

          { html: `<div class="project-block">

            <div class="proj-desc">

            </div>

          </div>` },
          { html: `<div class="project-block">
            <div class="proj-name"><a href="https://github.com/Leo984357/fund-pool-model">fund-pool-model/</a></div>
            <div class="proj-desc">
              <div class="en">Fund pool construction & performance evaluation framework</div>
              <div class="cn">基金池构建与绩效归因框架，支持多维度筛选与评价</div>
            </div>
            <div class="proj-tags"><span>Python</span><span>基金评价</span><span>绩效归因</span></div>
          </div>` },
          { html: `<div class="project-block">
            <div class="proj-name"><a href="https://github.com/Leo984357/fund-pool-model-rewritten">fund-pool-model-rewritten/</a></div>
            <div class="proj-desc">
              <div class="en">Refactored fund pool model with improved architecture & performance</div>

            </div>
            <div class="proj-tags"><span>Python</span><span>重构</span><span>架构优化</span></div>
          </div>` },
          { html: `<div class="project-block">
            <div class="proj-name"><a href="https://github.com/Leo984357/gamma-ai-exposure">gamma-ai-exposure/</a></div>
            <div class="proj-desc">
              <div class="en">AI exposure measurement via earnings call NLP analysis</div>
              <div class="cn">通过财报电话会议 NLP 分析度量企业 AI 暴露程度</div>
            </div>
            <div class="proj-tags"><span>NLP</span><span>Earnings Call</span><span>Python</span></div>
          </div>` },
          { html: `<div class="project-block">
            <div class="proj-name"><a href="https://github.com/Leo984357/smart-fund">smart-fund/</a></div>
            <div class="proj-desc">
              <div class="en">Fund data scraping, analysis & interactive dashboard</div>
              <div class="cn">基金数据爬取、分析与可视化仪表盘</div>
            </div>
            <div class="proj-tags"><span>Selenium</span><span>PySide6</span><span>数据可视化</span><span>SQLite</span></div>

          { html: `<div class="project-block">

            <div class="proj-desc">
              <div class="en">HS300 multi-factor research framework & backtesting pipeline</div>
              <div class="cn">沪深 300 多因子研究骨架，回测框架与因子分析管线</div>
            </div>
            <div class="proj-tags"><span>多因子</span><span>回测</span><span>Python</span></div>
          </div>` },

      },
      {
        cmd: 'cat experience.md',
        output: [
          { html: `<div class="exp-line"><span class="exp-date">Jul 2025 – Sep 2025</span><span class="exp-detail"><span class="exp-company">Securities Times</span> · Research Intern <span class="dim">(Shenzhen)</span></span></div>` },
          { html: `<div class="exp-line"><span class="exp-date">Sep 2025 – Nov 2025</span><span class="exp-detail"><span class="exp-company">China Foreign Trade Centre</span> · VIP Affairs Intern <span class="dim">(Guangzhou)</span></span></div>` },
          { html: `<div class="exp-line"><span class="exp-date">Jul 2024 – Aug 2024</span><span class="exp-detail"><span class="exp-company">Tencent CSIG</span> · Operations Intern <span class="dim">(Shenzhen)</span></span></div>` },
          { html: `<div class="exp-line" style="margin-top:8px;"><span class="exp-date">2022 – 2026</span><span class="exp-detail"><span class="exp-company">Guangdong University of Foreign Studies</span> · B.Eng Financial Engineering <span class="dim">(Guangzhou)</span></span></div>` },
        ]
      },
      {
        cmd: 'cat research.md',
        output: [
          { html: `<div class="research-block">
            <div class="pub-title">Corporate LLM Exposure Factor & Asset Pricing</div>
            <div class="pub-meta"><em>First Author</em> · <span class="dim">Working Paper</span></div>
          </div>` },
          { html: '<span style="color:#8b949e;font-size:13px;">~7.5M job postings (2014–2024) → NLP pipeline → firm-year AI exposure factor → Chinese A-share asset pricing</span>' },
          { html: '<span class="zh" style="color:#8b949e;font-size:13px;">基于 750 万条招聘数据构建企业 AI 暴露因子，检验其在 A 股市场的定价能力</span>' },
          { text: '' },
          { html: `<div class="research-block" style="margin-top:8px;">
            <div class="pub-title">HS300 LightGBM Multi-Factor Strategy</div>
            <div class="pub-meta"><em>First Prize, FinTech Diankuan Cup (Top 2%)</em></div>
          </div>` },
          { html: '<span style="color:#8b949e;font-size:13px;">81.87% cumulative return vs 11.87% benchmark (2022–2025) · Live on QMT</span>' },
          { html: '<span class="zh" style="color:#8b949e;font-size:13px;">累计收益 81.87%，基准 11.87%，QMT 平台实盘运行中</span>' },
        ]
      },
      {
        cmd: './contact.sh',
        output: [
          { html: `<div class="badge-row">
            <a href="mailto:leo2974656036@foxmail.com"><img src="https://img.shields.io/badge/leo2974656036@foxmail.com-EA4335?style=for-the-badge&logo=gmail&logoColor=white" /></a>
            <a href="https://github.com/Leo984357"><img src="https://img.shields.io/badge/github.com/Leo984357-181717?style=for-the-badge&logo=github&logoColor=white" /></a>
            <img src="https://img.shields.io/badge/Guangzhou%2FShenzhen-00C853?style=for-the-badge&logo=googlemaps&logoColor=white" />
            <img src="https://visitor-badge.laobi.icu/badge?page_id=Leo984357.Leo984357&left_text=visits" />
          </div>` },
        ]
      },
    ];

    let sectionIdx = 0;
    let lineIdx = 0;
    let charIdx = 0;

    const linesEl = document.getElementById('lines');
    const currentLine = document.getElementById('current-line');
    const cmdText = document.getElementById('cmd-text');
    const typeCursor = document.getElementById('type-cursor');
    const promptEnd = document.getElementById('prompt-end');

    function typeCommand(cmd, cb) {
      currentLine.style.display = 'block';
      promptEnd.style.display = 'none';
      cmdText.textContent = '';
      charIdx = 0;

      function tick() {
        if (charIdx < cmd.length) {
          cmdText.textContent += cmd[charIdx];
          charIdx++;
          setTimeout(tick, 40 + Math.random() * 30);
        } else {
          typeCursor.style.display = 'none';
          setTimeout(cb, 350);
        }
      }
      tick();
    }

    function showLine(html) {
      const p = document.createElement('div');
      p.className = 'line output indent';
      p.innerHTML = html;
      linesEl.appendChild(p);
    }

    function showCommand(cmd) {
      const p = document.createElement('div');
      p.className = 'line';
      p.innerHTML = `<span class="prompt"><span class="prompt-user">shuoren</span>@<span class="prompt-user">portfolio</span></span>:<span class="path-dir">~</span>$ <span class="cmd">${cmd}</span>`;
      linesEl.appendChild(p);
    }

    function runSection() {
      if (sectionIdx >= sections.length) {
        currentLine.style.display = 'none';
        promptEnd.style.display = 'block';
        return;
      }

      const section = sections[sectionIdx];
      lineIdx = 0;

      typeCommand(section.cmd, () => {
        showCommand(section.cmd);

        function showNextLine() {
          if (lineIdx < section.output.length) {
            const out = section.output[lineIdx];
            lineIdx++;
            showLine(out.html || out.text);
            const delay = out.text === '' || out.html === '' ? 80 : 180 + Math.random() * 120;
            setTimeout(showNextLine, delay);
          } else {
            if (sectionIdx < sections.length - 1) {
              setTimeout(() => linesEl.appendChild(document.createElement('hr')), 250);
            }
            sectionIdx++;
            typeCursor.style.display = 'inline-block';
            setTimeout(runSection, 450);
          }
        }
        setTimeout(showNextLine, 250);
      });
    }

    document.getElementById('ascii-header').textContent = ASCII_HEADER;
    setTimeout(runSection, 600);
  </script>
</body>
</html>
